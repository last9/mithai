# mithai configuration
# Docs: https://github.com/last9/mithai

bot:
  name: mithai
  system_prompt: |
    You are a helpful operations assistant.
    You have access to skills that let you interact with infrastructure.
    Be concise and precise. Explain before acting.

# Global adapter kept for --adapter cli override and validation
adapter:
  types:
    - slack
  slack:
    bot_token: ${SLACK_BOT_TOKEN}
    app_token: ${SLACK_APP_TOKEN}
    respond: mentions  # observe all messages, reply only to @mentions
    # Advanced safety: default true preserves existing behavior.
    # Set false to prevent mithai from posting final assistant responses,
    # adapter.send() messages, or Slack send-message tool output into Slack
    # Connect / externally shared channels. The adapter detects those channels
    # with Slack conversations.info metadata.
    #
    # allow_posting_in_external_channels: false
  telegram:
    bot_token: ${TELEGRAM_BOT_TOKEN}
    allowed_chat_ids:
      - ${TELEGRAM_CHAT_ID}

llm:
  provider: anthropic
  model: claude-opus-4-6
  max_tokens: 16384
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}

  # To use AWS Bedrock instead, set provider: bedrock and configure the bedrock block:
  # provider: bedrock
  # model: anthropic.claude-opus-4-20250514-v1:0  # any Bedrock model ID
  # bedrock:
  #   access_key_id: ${AWS_ACCESS_KEY_ID}
  #   secret_access_key: ${AWS_SECRET_ACCESS_KEY}
  #   region: ${AWS_REGION}
  #   session_token: ${AWS_SESSION_TOKEN}  # optional — only for temporary (STS) credentials
  # Install: pip install 'mithai[bedrock]'

# MCP servers — shared infrastructure for tool backends
# Skills declare which MCP tools they need in their tools.py (MCP_TOOLS)
# mcp_servers:
#   last9:
#     transport: streamablehttp
#     url: https://mcp.example.com
#     headers:
#       X-API-TOKEN: Bearer ${EXAMPLE_API_TOKEN}

skills:
  paths:
    - ./skills

learning:
  enabled: true
  reflection: true
  approval_auto_promote: 3
  memory:
    backend: filesystem
    filesystem:
      path: ./memory

heartbeat:
  enabled: true
  interval: 60  # seconds — set to 3600 in production

# Multi-agent mode — each agent is its own Slack app
# Uncomment and set FIRST_SLACK_BOT_TOKEN / SECOND_SLACK_BOT_TOKEN to enable.
# agents:
#   devops:
#     name: "DevOps Agent"
#     system_prompt: |
#       You are a helpful operations assistant. You are a member of the devops team. You have a funny personality.
#       You have access to skills that let you interact with infrastructure.
#       Be concise and precise. Explain before acting.
#     skills:
#       allowed: [shell, memory, http_checker, sessions]
#     memory:
#       path: ./memory/devops
#     adapter:
#       slack:
#         bot_token: ${FIRST_SLACK_BOT_TOKEN}
#         app_token: ${FIRST_SLACK_APP_TOKEN}
#
#   tester:
#     name: "Tester Agent"
#     system_prompt: |
#       You are a testing assistant. You are a member of the testing team. You have a not so funny personality.
#       You help verify infrastructure, run checks, and validate deployments.
#       Be thorough and report findings clearly.
#     skills:
#       allowed: [shell, memory, http_checker]
#     memory:
#       path: ./memory/tester
#     adapter:
#       slack:
#         bot_token: ${SECOND_SLACK_BOT_TOKEN}
#         app_token: ${SECOND_SLACK_APP_TOKEN}
#
#   default_agent: devops

ui:
  host: 0.0.0.0
  port: 8420
  auth_token: ${MITHAI_UI_TOKEN}

telemetry:
  enabled: true
  service_name: mithai
  exporter: otlp
  otlp:
    endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:-https://otlp.example.com:443}
    headers:
      Authorization: ${OTEL_EXPORTER_OTLP_HEADERS}
  sampling:
    ratio: 1.0
  logs:
    enabled: true
    level: ERROR

state:
  backend: filesystem
  filesystem:
    path: ./.mithai/state
