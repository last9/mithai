apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mithai.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mithai.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.llm.apiKey }}
  ANTHROPIC_API_KEY: {{ .Values.llm.apiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.adapter.slack.botToken }}
  SLACK_BOT_TOKEN: {{ .Values.adapter.slack.botToken | b64enc | quote }}
  {{- end }}
  {{- if .Values.adapter.slack.appToken }}
  SLACK_APP_TOKEN: {{ .Values.adapter.slack.appToken | b64enc | quote }}
  {{- end }}
  {{- if .Values.adapter.telegram.botToken }}
  TELEGRAM_BOT_TOKEN: {{ .Values.adapter.telegram.botToken | b64enc | quote }}
  {{- end }}
  {{- if .Values.ui.authToken }}
  MITHAI_UI_TOKEN: {{ .Values.ui.authToken | b64enc | quote }}
  {{- end }}
  {{- range $key, $value := .Values.extraSecrets }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
