name: Release

on:
  push:
    tags:
      - 'v*'

  # Keep manual trigger for dry runs
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — build everything but don't publish"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

env:
  GHCR_IMAGE: ghcr.io/nishantmodak/mithai
  LAST9_IMAGE: docker-registry.last9.io/mithai

jobs:
  # ── Extract version from tag or pyproject.toml ──
  meta:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      is_tag: ${{ steps.ver.outputs.is_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/}"
            echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
          else
            PY_VERSION="v$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
            echo "version=$PY_VERSION" >> "$GITHUB_OUTPUT"
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify pyproject.toml matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PY_VERSION="v$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          TAG_VERSION="${GITHUB_REF#refs/tags/}"
          if [ "$PY_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::pyproject.toml version ($PY_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

  # ── Build platform binaries ──
  build-binaries:
    name: Build ${{ matrix.platform }}
    needs: meta
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            platform: darwin-arm64
          - runner: ubuntu-latest
            platform: linux-amd64
          - runner: windows-latest
            platform: windows-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Build binary
        run: |
          uv run pyinstaller mithai.spec --noconfirm
          ls -lh dist/mithai-*

      - name: Smoke test binary
        shell: bash
        run: |
          BINARY=$(ls dist/mithai-*)
          chmod +x "$BINARY" 2>/dev/null || true
          "$BINARY" --version
          "$BINARY" --help
          echo "Smoke tests passed for $BINARY"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mithai-${{ matrix.platform }}
          path: dist/mithai-*
          if-no-files-found: error

  # ── Build and push Docker image ──
  build-docker:
    name: Build Docker image
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Last9 registry
        if: ${{ secrets.LAST9_REGISTRY_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          registry: docker-registry.last9.io
          username: ${{ secrets.LAST9_REGISTRY_USERNAME }}
          password: ${{ secrets.LAST9_REGISTRY_PASSWORD }}

      - name: Extract Docker tags
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.LAST9_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        if: ${{ needs.meta.outputs.is_tag == 'true' && !inputs.dry_run }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build only (dry run)
        if: ${{ needs.meta.outputs.is_tag != 'true' || inputs.dry_run }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}

  # ── Publish to PyPI ──
  publish-pypi:
    name: Publish to PyPI
    needs: [meta, build-binaries]
    if: ${{ needs.meta.outputs.is_tag == 'true' && !inputs.dry_run }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # trusted publishing
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── Publish Helm chart to GitHub Pages ──
  publish-helm:
    name: Publish Helm chart
    needs: [meta, build-binaries]
    if: ${{ needs.meta.outputs.is_tag == 'true' && !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          helm package deploy/helm/mithai/ --destination .helm-packages/

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Update Helm repo index
        run: |
          cp .helm-packages/*.tgz gh-pages/
          helm repo index gh-pages/ --url https://nishantmodak.github.io/mithai

      - name: Push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: publish helm chart ${{ needs.meta.outputs.version }}"
          git push

  # ── Create GitHub Release ──
  release:
    name: Create GitHub Release
    needs: [meta, build-binaries, build-docker]
    if: ${{ needs.meta.outputs.is_tag == 'true' && !inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release/
          find artifacts/ -name 'mithai-*' -type f -exec mv {} release/ \;
          chmod +x release/mithai-* 2>/dev/null || true

          cd release
          sha256sum mithai-* > checksums.txt 2>/dev/null || shasum -a 256 mithai-* > checksums.txt
          echo "=== Release assets ==="
          ls -lh
          echo ""
          echo "=== Checksums ==="
          cat checksums.txt

      - name: Generate release notes
        id: notes
        env:
          RELEASE_VERSION: ${{ needs.meta.outputs.version }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          {
            echo "NOTES<<EOF"
            echo "## Mithai ${RELEASE_VERSION}"
            echo ""
            echo "### Installation"
            echo ""
            echo '```sh'
            echo '# Binary (macOS/Linux)'
            echo 'curl -fsSL https://raw.githubusercontent.com/nishantmodak/mithai/master/install.sh | sh'
            echo ''
            echo '# Python'
            echo 'pip install mithai'
            echo ''
            echo '# Docker'
            echo "docker pull ghcr.io/nishantmodak/mithai:${RELEASE_VERSION#v}"
            echo ''
            echo '# Helm'
            echo 'helm repo add mithai https://nishantmodak.github.io/mithai'
            echo "helm install mithai mithai/mithai --version ${RELEASE_VERSION#v}"
            echo '```'
            echo ""
            echo "### Quick start"
            echo ""
            echo '```sh'
            echo 'mithai init      # interactive setup wizard'
            echo 'mithai doctor    # verify configuration'
            echo 'mithai run       # start the agent'
            echo '```'
            echo ""
            echo "### What's changed"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" -- | head -30
            else
              git log --pretty=format:"- %s" -20
            fi
            echo ""
            echo ""
            echo "### Checksums (SHA256)"
            echo ""
            echo '```'
            cat release/checksums.txt
            echo '```'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          RELEASE_VERSION: ${{ needs.meta.outputs.version }}
          RELEASE_NOTES: ${{ steps.notes.outputs.NOTES }}
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          case "$RELEASE_VERSION" in
            *-*) PRERELEASE_FLAG="--prerelease" ;;
          esac

          gh release create "$RELEASE_VERSION" \
            --title "$RELEASE_VERSION" \
            --notes "$RELEASE_NOTES" \
            $PRERELEASE_FLAG \
            release/mithai-* \
            release/checksums.txt \
            install.sh
