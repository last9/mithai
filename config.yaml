# mithai configuration
# Docs: https://github.com/nishantmodak/mithai

bot:
  name: mithai
  system_prompt: |
    You are a helpful operations assistant.
    You have access to skills that let you interact with infrastructure.
    Be concise and precise. Explain before acting.

adapter:
  # Run multiple adapters simultaneously
  types:
    - slack
  slack:
    bot_token: ${SLACK_BOT_TOKEN}
    app_token: ${SLACK_APP_TOKEN}
  telegram:
    bot_token: ${TELEGRAM_BOT_TOKEN}
    allowed_chat_ids:
      - ${TELEGRAM_CHAT_ID}

llm:
  provider: anthropic
  model: claude-sonnet-4-6
  max_tokens: 4096
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}

# MCP servers — shared infrastructure for tool backends
# Skills declare which MCP tools they need in their tools.py (MCP_TOOLS)
mcp_servers:
  linear:
    transport: sse
    url: https://mcp.linear.app/sse
    headers:
      Authorization: Bearer ${LINEAR_API_KEY}
#   github:
#     transport: stdio
#     command: npx
#     args: ["-y", "@github/mcp-server"]
#     env:
#       GITHUB_TOKEN: ${GITHUB_TOKEN}

skills:
  paths:
    - ./skills

learning:
  enabled: true
  memory_dir: ./memory
  reflection: true
  approval_auto_promote: 3

state:
  backend: filesystem
  filesystem:
    path: ./.mithai/state
