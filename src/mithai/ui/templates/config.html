{% extends "base.html" %}
{% set active = "config" %}

{% block title %}Config{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Configuration</h1>
    <p class="page-subtitle">Current agent configuration &middot; read-only</p>
</div>

<div class="card" style="margin-bottom: 16px; border-left: 3px solid var(--yellow);">
    <div class="card-body" style="padding: 14px 24px;">
        <div style="display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-secondary);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--yellow)" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            <span>API keys, tokens, and secrets are redacted for security</span>
            <span style="margin-left: auto; color: var(--text-muted); font-family: var(--mono); font-size: 12px;">{{ config_path }}</span>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <pre><code>{{ config | tojson }}</code></pre>
    </div>
</div>
{% endblock %}
