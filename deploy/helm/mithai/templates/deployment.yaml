apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mithai.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mithai.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "mithai.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        {{- include "mithai.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "mithai.serviceAccountName" . }}
      terminationGracePeriodSeconds: 30
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "mithai.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ include "mithai.fullname" . }}-secrets
          {{- if .Values.ui.enabled }}
          ports:
            - name: http-ui
              containerPort: {{ .Values.ui.port }}
              protocol: TCP
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: state
              mountPath: /app/.mithai/state
            - name: memory
              mountPath: /app/memory
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "mithai"]
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: {{ include "mithai.fullname" . }}-config
        - name: state
          {{- if .Values.persistence.state.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "mithai.fullname" . }}-state
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: memory
          {{- if .Values.persistence.memory.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "mithai.fullname" . }}-memory
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
