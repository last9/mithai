apiVersion: v1
kind: ConfigMap
metadata:
  name: mithai-config
  namespace: mithai
  labels:
    app.kubernetes.io/name: mithai
data:
  config.yaml: |
    bot:
      name: mithai
      system_prompt: |
        You are a helpful operations assistant.
        You have access to skills that let you interact with infrastructure.
        Be concise and precise. Explain before acting.

    adapter:
      types:
        - slack
      slack:
        bot_token: ${SLACK_BOT_TOKEN}
        app_token: ${SLACK_APP_TOKEN}

    llm:
      provider: anthropic
      model: claude-sonnet-4-6
      max_tokens: 4096
      anthropic:
        api_key: ${ANTHROPIC_API_KEY}

    skills:
      paths:
        - /app/skills
      config:
        kubernetes:
          default_namespace: default
          # Empty = use in-cluster ServiceAccount token automatically
          context: ""
          kubeconfig: ""
          alert_channel: ""
          poll_interval_minutes: 5
          cooldown_minutes: 30
          namespaces: []
          auto_investigate: true
          exclude_namespaces:
            - kube-system
            - kube-public
            - kube-node-lease

    learning:
      enabled: true
      memory_dir: /app/memory
      reflection: true
      approval_auto_promote: 3

    state:
      backend: filesystem
      filesystem:
        path: /app/.mithai/state
